[SERVICE]
    flush           5
    log_level       info
    daemon          off
    parsers_file    /fluent-bit/etc/parsers.conf
    http_server     On
    http_listen      0.0.0.0
    http_port       2020
    storage.path    /fluent-bit/state/flb-storage/
    storage.sync    normal
    storage.checksum on
    storage.backlog.mem_limit 50M

[INPUT]
    name            tail
    path            /logs/*.log
    parser          json
    tag             backend.*
    refresh_interval 5
    mem_buf_limit   50MB
    skip_long_lines On
    db              /fluent-bit/state/flb-tail.db
    db.sync         Normal
    storage.type    filesystem

[INPUT]
    name            forward
    listen          0.0.0.0
    port            24224
    buffer_chunk_size 1M
    buffer_max_size 6M

[FILTER]
    name            parser
    match           backend.*
    key_name        log
    parser          json
    reserve_data    True
    preserve_key    True

[FILTER]
    name            nest
    match           backend.*
    operation       lift
    nest_field      metadata

[FILTER]
    name            modify
    match           backend.*
    add             service backend
    add             component ai-interview
    rename          level severity
    rename          msg message
    remove          timestamp
    remove          v

[OUTPUT]
    name            stdout
    match           *
    format          json_lines
    json_date_key   timestamp
    json_date_format iso8601

[OUTPUT]
    name            forward
    match           *
    host            ${FLUENT_FORWARD_HOST:-fluent-aggregator}
    port            ${FLUENT_FORWARD_PORT:-24224}
    retry_limit     False

[OUTPUT]
    name            prometheus_exporter
    match           backend.*
    host            0.0.0.0
    port            2021
