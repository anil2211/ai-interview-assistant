apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: ai-interview-assistant
data:
  NODE_ENV: "production"
  PORT: "5000"
  LOG_LEVEL: "info"
  JWT_EXPIRY: "7d"
  FLUENT_HOST: "fluent-bit-svc"
  FLUENT_PORT: "24224"
  PROMETHEUS_ENABLED: "true"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX: "100"
  CORS_ORIGINS: "https://interview-assistant.example.com"
  MONGODB_DATABASE: "interview_assistant"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: ai-interview-assistant
data:
  nginx.conf: |
    upstream backend {
      server backend-svc:5000;
      keepalive 64;
    }

    server {
      listen 80;
      server_name interview-assistant.example.com;
      root /usr/share/nginx/html;
      index index.html;

      client_max_body_size 50M;

      gzip on;
      gzip_comp_level 5;
      gzip_min_length 256;
      gzip_proxied any;
      gzip_vary on;
      gzip_types application/javascript application/json text/css text/javascript text/plain text/xml image/svg+xml;

      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

      limit_req_zone $binary_remote_addr zone=k8s_limit:10m rate=30r/s;
      limit_req zone=k8s_limit burst=50 nodelay;

      location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
      }

      location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
      }

      location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
      }

      location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
      }

      location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
      }

      location ~ /\. {
        deny all;
        access_log off;
      }

      error_page 404 /index.html;
      error_page 500 502 503 504 /index.html;
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ai-interview-assistant
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: ai-interview-assistant
        environment: production

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager-svc:9093"]

    rule_files:
      - /etc/prometheus/alert-rules.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: backend
        metrics_path: /metrics
        static_configs:
          - targets: ["backend-svc:5000"]

      - job_name: kubernetes-nodes
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace

    alert_rules.yml: |
      groups:
        - name: backend-alerts
          rules:
            - alert: HighErrorRate
              expr: rate(http_requests_duration_seconds_count{status=~"5.."}[5m]) / rate(http_requests_duration_seconds_count[5m]) > 0.05
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "High HTTP error rate ({{ $value }}%)"
                description: "Backend is returning >=5% 5xx errors."
            - alert: HighResponseTime
              expr: histogram_quantile(0.95, sum(rate(http_requests_duration_seconds_bucket[5m])) by (le)) > 2
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "High P95 response time ({{ $value }}s)"
                description: "P95 response time is above 2s."
            - alert: LowRequestRate
              expr: rate(http_requests_duration_seconds_count[5m]) < 10
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "Low request rate"
                description: "Request rate is below 10 req/s for 10 minutes."
