apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: ai-interview-assistant
type: Opaque
data:
  # Generate with: echo -n "your-value" | base64
  # Production: Replace all values with actual base64-encoded secrets
  JWT_SECRET: <placeholder: base64 of your-jwt-secret-change-in-production>
  MONGODB_URI: <placeholder: base64 of mongodb://username:password@mongodb-svc:27017/interview_assistant?authSource=admin>
  OPENAI_API_KEY: <placeholder: base64 of sk-your-openai-api-key>
  SPEECH_TO_TEXT_API_KEY: <placeholder: base64 of your-stt-api-key>
  MONGO_ROOT_USERNAME: <placeholder: base64 of admin>
  MONGO_ROOT_PASSWORD: <placeholder: base64 of mongoadmin123>
---
apiVersion: v1
kind: Secret
metadata:
  name: app-tls
  namespace: ai-interview-assistant
type: kubernetes.io/tls
data:
  tls.crt: <placeholder: base64 of certificate>
  tls.key: <placeholder: base64 of key>
