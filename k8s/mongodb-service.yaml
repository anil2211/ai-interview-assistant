apiVersion: v1
kind: Service
metadata:
  name: mongodb-svc
  namespace: ai-interview-assistant
  labels:
    app: ai-interview-assistant
    component: mongodb
spec:
  type: ClusterIP
  ports:
    - port: 27017
      targetPort: 27017
      protocol: TCP
      name: mongodb
  selector:
    app: ai-interview-assistant
    component: mongodb
