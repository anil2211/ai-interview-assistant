global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "alerts@interview-assistant.com"
  smtp_auth_username: "alerts@interview-assistant.com"
  smtp_auth_password: "smtp-password-placeholder"
  smtp_require_tls: true
  slack_api_url: "https://hooks.slack.com/services/"

templates:
  - "/etc/alertmanager/templates/*.tmpl"

route:
  group_by: ["alertname", "severity", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default-receiver"
  routes:
    - receiver: "critical-alerts"
      match:
        severity: critical
      repeat_interval: 1h
      group_wait: 10s
    - receiver: "warning-alerts"
      match:
        severity: warning
      repeat_interval: 4h
    - receiver: "backend-alerts"
      match:
        service: ai-interview-backend
      group_by: ["alertname", "severity"]
    - receiver: "infrastructure-alerts"
      match:
        service: node-exporter
    - receiver: "watchdog"
      match:
        alertname: Watchdog

receivers:
  - name: "default-receiver"
    email_configs:
      - to: "team@interview-assistant.com"
        send_resolved: true
        headers:
          subject: '{{ template "email.default.subject" . }}'

  - name: "critical-alerts"
    email_configs:
      - to: "oncall@interview-assistant.com"
        send_resolved: true
        headers:
          subject: "[CRITICAL] {{ .GroupLabels.alertname }}"
    slack_configs:
      - channel: "#alerts-critical"
        send_resolved: true
        title: '[CRITICAL] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'
        icon_emoji: ":fire:"

  - name: "warning-alerts"
    email_configs:
      - to: "team@interview-assistant.com"
        send_resolved: true
    slack_configs:
      - channel: "#alerts-warnings"
        send_resolved: true
        title: '[WARNING] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'
        icon_emoji: ":warning:"

  - name: "backend-alerts"
    email_configs:
      - to: "backend-team@interview-assistant.com"
        send_resolved: true
    slack_configs:
      - channel: "#backend-alerts"
        send_resolved: true

  - name: "infrastructure-alerts"
    slack_configs:
      - channel: "#infra-alerts"
        send_resolved: true
        icon_emoji: ":computer:"

  - name: "watchdog"
    slack_configs:
      - channel: "#monitoring"
        send_resolved: true
        icon_emoji: ":dog:"
        title: 'Watchdog Alert'
        text: 'Alertmanager watchdog is running.'
