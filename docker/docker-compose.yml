version: "3.8"

networks:
  interview-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  backend_logs:
    driver: local

services:
  mongodb:
    image: mongo:7
    container_name: ai-interview-mongodb
    restart: unless-stopped
    networks:
      - interview-network
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./database/init.js:/docker-entrypoint-initdb.d/init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-mongoadmin123}
      MONGO_INITDB_DATABASE: interview_assistant
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  mongo-express:
    image: mongo-express:latest
    container_name: ai-interview-mongo-express
    restart: unless-stopped
    networks:
      - interview-network
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-mongoadmin123}
      ME_CONFIG_MONGODB_URL: mongodb://admin:${MONGO_ROOT_PASSWORD:-mongoadmin123}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-express123}
    depends_on:
      mongodb:
        condition: service_healthy

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: ai-interview-backend
    restart: unless-stopped
    networks:
      - interview-network
    ports:
      - "5000:5000"
    volumes:
      - backend_logs:/app/logs
    env_file:
      - ../backend/.env
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:${MONGO_ROOT_PASSWORD:-mongoadmin123}@mongodb:27017/interview_assistant?authSource=admin
      FLUENT_HOST: fluent-bit
      PROMETHEUS_ENABLED: "true"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: ai-interview-frontend
    restart: unless-stopped
    networks:
      - interview-network
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  prometheus:
    image: prom/prometheus:latest
    container_name: ai-interview-prometheus
    restart: unless-stopped
    networks:
      - interview-network
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alertmanager.yml:/etc/prometheus/alertmanager.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: ai-interview-grafana
    restart: unless-stopped
    networks:
      - interview-network
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/interview-dashboard.json:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/interview-dashboard.json
    depends_on:
      prometheus:
        condition: service_started

  fluent-bit:
    image: fluent/fluent-bit:latest
    container_name: ai-interview-fluent-bit
    restart: unless-stopped
    networks:
      - interview-network
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    volumes:
      - backend_logs:/logs:ro
      - ./monitoring/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
    command:
      - "/fluent-bit/bin/fluent-bit"
      - "-c"
      - "/fluent-bit/etc/fluent-bit.conf"
